name: Release

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: 'Tag name for the release (e.g., v1.2.3)'
                required: true
                type: string
    workflow_call:
        inputs:
            tag_name:
                description: 'Tag name for the release (e.g., v1.2.3)'
                required: true
                type: string

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.tag_name || github.event.inputs.tag_name }}

            - name: Generate changelog
              id: changelog
              uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
              with:
                  config: cliff.toml
                  args: --current --verbose
              env:
                  OUTPUT: CHANGELOG.md

            - name: Delete draft release
              continue-on-error: true
              run: |
                  gh release delete next-release --yes --repo "$GITHUB_REPOSITORY"
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Create Release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
              with:
                  tag_name: ${{ inputs.tag_name || github.event.inputs.tag_name }}
                  body: ${{ steps.changelog.outputs.content }}
                  draft: false
                  prerelease: ${{ contains(inputs.tag_name ||
                      github.event.inputs.tag_name, 'alpha') ||
                      contains(inputs.tag_name || github.event.inputs.tag_name,
                      'beta') }}

            - name: Update major version tag
              env:
                  TAG_NAME: ${{ inputs.tag_name || github.event.inputs.tag_name }}
              run: |
                  case "$TAG_NAME" in
                      *alpha* | *beta*)
                          echo "prerelease tag; major tag not moved"
                          exit 0
                          ;;
                  esac
                  MAJOR="${TAG_NAME%%.*}"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  # Point the major tag at the commit (peel the annotated
                  # release tag): a ref named v0 pointing at a tag object
                  # named v0.1.0 breaks `git describe --abbrev=0`.
                  git tag -f "$MAJOR" "$TAG_NAME^{}"
                  git push origin -f "refs/tags/$MAJOR"
