[project]
site_name = "dependency-support-policy-action"
site_description = "Manage rolling minimum-supported versions (SPEC 0 style) for Python projects, as a CLI and GitHub Action."
site_author = "Isaac C. F. Wong"
site_url = "https://isaac-cf-wong.github.io/dependency-support-policy-action/"
repo_url = "https://github.com/isaac-cf-wong/dependency-support-policy-action"
copyright = """
Copyright &copy; 2026 Isaac C. F. Wong
"""

nav = [
  { "Home" = "index.md" },
  { "User Guide" = [
    { "Support-Window Model" = "user-guide/support-window-model.md" },
    { "Configuration" = "user-guide/configuration.md" },
    { "CLI" = "user-guide/cli.md" },
    { "GitHub Action" = "user-guide/github-action.md" },
    { "uv.lock Handling" = "user-guide/lockfile.md" },
    { "Coexisting with Renovate" = "user-guide/renovate.md" },
    { "Ecosystem Packages" = "user-guide/ecosystem-packages.md" },
    { "Recommended CI" = "user-guide/ci-recommendations.md" },
    { "Known Limitations" = "user-guide/limitations.md" },
  ] },
  { "API Reference" = "reference/index.md" },
  { "Contributing" = "contributing.md" },
  { "Security" = "security.md" },
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.snippets]
